name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: Asteroids-macOS
            ext: .app
          - os: windows-latest
            artifact: Asteroids-Windows
            ext: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build with PyInstaller
        shell: bash
        run: uv run pyinstaller --onedir --windowed --name Asteroids --hidden-import=pygame._view --hidden-import=pygame.freetype --hidden-import=numpy main.py

      - name: Zip macOS app
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../Asteroids-macOS.zip Asteroids.app

      - name: Zip Windows app
        if: runner.os == 'Windows'
        shell: bash
        run: cd dist && 7z a ../Asteroids-Windows.zip Asteroids/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Asteroids-macOS

      - uses: actions/download-artifact@v4
        with:
          name: Asteroids-Windows

      - name: List files
        run: ls -la

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Asteroids-macOS.zip
            Asteroids-Windows.zip
